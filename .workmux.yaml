files:
  copy:
    # Bun-installed dependencies. Copy so each worktree can add/remove packages
    # independently without affecting siblings.
    - node_modules

    # Panda CSS codegen output (generated by `bun run prepare`). Copying skips
    # the codegen step on first `next dev`.
    - styled-system

    # Next.js build/dev cache. Massively speeds up the first `next dev` / build
    # in a new worktree by reusing compiled chunks.
    - .next

    # TypeScript incremental build state. Avoids a full type-check on first run.
    - tsconfig.tsbuildinfo
